```html
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupons - Lavador do Deir</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="page-content">

        <div class="page-title-card">
            <h1>Lavador do Deir</h1>
        </div>

        <div class="container">

            <h2>Meus Cupons</h2>

            <div id="progressoFidelidade">
                <p>Carregando progresso...</p>
            </div>

            <h3>Cupons Disponíveis</h3>

            <div id="listaCupons">
                <p>Carregando cupons...</p>
            </div>

            <br>

            <a href="dashboard.html">
                Voltar ao Dashboard
            </a>

        </div>

    </div>

    <script>

        async function carregarCupons() {

            const usuarioLogado = JSON.parse(sessionStorage.getItem("user"));

            // Impede o acesso à tela de cupons caso não exista usuário logado
            if (!usuarioLogado || !usuarioLogado.id) {
                alert("Você precisa estar logado para acessar seus cupons.");
                window.location.href = "login.html";
                return;
            }

            try {

                // Busca os dados do cliente para exibir o progresso no programa de fidelidade
                const respostaClientes = await fetch("http://localhost:8080/clientes");
                const clientes = await respostaClientes.json();

                const clienteAtual = clientes.find(cliente =>
                    cliente.id === usuarioLogado.id
                );

                const progresso = document.getElementById("progressoFidelidade");

                if (!clienteAtual) {
                    progresso.innerHTML = "<p>Cliente não encontrado.</p>";
                    return;
                }

                const lavadas = clienteAtual.quantidadeLavadas;
                const faltam = 10 - lavadas;

                progresso.innerHTML = `
                    <div class="historico-item">
                        <p><strong>Lavadas realizadas:</strong> ${lavadas}</p>
                        <p><strong>Faltam:</strong> ${faltam} lavada(s) para ganhar um cupom.</p>
                        <p class="aviso-valores">
                            A cada 10 lavadas concluídas, você ganha um cupom de 25% de desconto.
                        </p>
                    </div>
                `;

                // Busca todos os cupons cadastrados no sistema
                const respostaCupons = await fetch("http://localhost:8080/cupons");
                const cupons = await respostaCupons.json();

                const hoje = new Date();

                // Filtra apenas os cupons do cliente logado que ainda não foram utilizados ou expirados
                const cuponsDoCliente = cupons.filter(cupom => {

                    const pertenceAoCliente = cupom.clienteId === usuarioLogado.id;

                    let expirado = false;

                    if (cupom.dataValidade) {
                        const dataValidade = new Date(cupom.dataValidade + "T23:59:59");
                        expirado = hoje > dataValidade;
                    }

                    return pertenceAoCliente && !cupom.utilizado && !expirado;
                });

                const lista = document.getElementById("listaCupons");

                if (cuponsDoCliente.length === 0) {
                    lista.innerHTML = "<p>Você ainda não possui cupons disponíveis.</p>";
                    return;
                }

                lista.innerHTML = "";

                // Exibe os cupons disponíveis para o cliente
                cuponsDoCliente.forEach(cupom => {

                    let statusCupom = "Disponível";

                    if (cupom.utilizado) {
                        statusCupom = "Utilizado";
                    }

                    if (cupom.dataValidade) {
                        const hoje = new Date();
                        const dataValidade = new Date(cupom.dataValidade + "T23:59:59");

                        if (!cupom.utilizado && hoje > dataValidade) {
                            statusCupom = "Expirado";
                        }
                    }

                    lista.innerHTML += `
                        <div class="historico-item">
                            <p>Parabéns! Você ganhou um cupom de desconto.</p>
                            <p><strong>Código:</strong> ${cupom.codigo}</p>
                            <p><strong>Desconto:</strong> ${cupom.desconto}%</p>
                            <p><strong>Status:</strong> ${statusCupom}</p>
                            <p><strong>Data de geração:</strong> ${cupom.dataGeracao || "Não informada"}</p>
                            <p><strong>Válido até:</strong> ${cupom.dataValidade || "Não informada"}</p>
                            <p><strong>Aviso:</strong> Cupom pessoal, intransferível e válido por até 30 dias.</p>
                        </div>
                    `;

                });

            } catch (erro) {

                console.log(erro);
                alert("Erro ao carregar os cupons.");

            }

        }

        carregarCupons();

    </script>

</body>

</html>
```
