<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Lavador do Deir</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="page-content">

        <div class="page-title-card">
            <h1>Lavador do Deir</h1>
        </div>

        <div class="container">

            <h2>Área do Cliente</h2>

            <p class="info-cliente">
                Olá, Cliente!
            </p>

            <!-- Exibe a quantidade de lavadas concluídas para o programa de fidelidade -->
            <p class="info-cliente">
                Total de lavadas: <strong id="totalLavadas">0</strong>
            </p>

            <h3>Meus Agendamentos</h3>

            <div id="listaAgendamentos">

                <p>Nenhum agendamento realizado.</p>

            </div>

            <!-- Direciona o cliente para a tela de solicitação de agendamento -->
            <button onclick="window.location.href='agendamento.html'">
                Agende a lavada do seu veículo
            </button>

            <br><br>

            <!-- Direciona o cliente para o histórico de atendimentos -->
            <button onclick="window.location.href='historico.html'">
                Histórico
            </button>

            <br><br>

            <!-- Direciona o cliente para a tela de cupons disponíveis -->
            <button onclick="window.location.href='cupons.html'">
                Meus Cupons
            </button>

            <br><br>

            <!-- Encerra a sessão do usuário logado -->
            <button onclick="sair()">
                Sair
            </button>

        </div>

    </div>

    <script>

        async function carregarDashboard() {

            const usuarioLogado = JSON.parse(sessionStorage.getItem("user"));

            // Impede o acesso ao dashboard caso não exista usuário logado
            if (!usuarioLogado || !usuarioLogado.id) {
                alert("Você precisa estar logado para acessar o dashboard.");
                window.location.href = "login.html";
                return;
            }

            // Personaliza a saudação com o nome do cliente logado
            document.querySelector(".info-cliente").textContent =
                `Olá, ${usuarioLogado.nome}!`;

            try {

                // Busca os dados atualizados do cliente para exibir o total de lavadas
                const respostaClientes = await fetch("http://localhost:8080/clientes");
                const clientes = await respostaClientes.json();

                const clienteAtual = clientes.find(cliente =>
                    cliente.id === usuarioLogado.id
                );

                if (clienteAtual) {
                    document.getElementById("totalLavadas").textContent =
                        clienteAtual.quantidadeLavadas;
                }

                // Busca todos os agendamentos cadastrados no sistema
                const resposta = await fetch("http://localhost:8080/agendamentos");
                const agendamentos = await resposta.json();

                // Filtra apenas os agendamentos em andamento do cliente logado
                const agendamentosDoCliente = agendamentos
                    .filter(agendamento =>
                        agendamento.clienteId === usuarioLogado.id &&
                        agendamento.status !== "CONCLUIDO" &&
                        agendamento.status !== "RECUSADO"
                    )
                    .sort((a, b) => {
                        const dataA = new Date(`${a.data}T${a.horaInicio}`);
                        const dataB = new Date(`${b.data}T${b.horaInicio}`);
                        return dataA - dataB;
                    });

                const lista = document.getElementById("listaAgendamentos");

                if (agendamentosDoCliente.length === 0) {

                    lista.innerHTML =
                        "<p>Nenhum agendamento em andamento.</p>";

                    return;
                }

                lista.innerHTML = "";

                // Exibe os agendamentos encontrados na tela do cliente
                agendamentosDoCliente.forEach(agendamento => {

                    lista.innerHTML += `

                    <div class="historico-item">

                        <p><strong>Veículo:</strong> ${agendamento.tipoVeiculo}</p>

                        <p><strong>Marca:</strong> ${agendamento.marca || "Não informado"}</p>

                        <p><strong>Modelo:</strong> ${agendamento.modelo || "Não informado"}</p>

                        <p><strong>Data:</strong> ${agendamento.data}</p>

                        <p><strong>Horário:</strong> ${agendamento.horaInicio}</p>

                        <p><strong>Status:</strong> ${agendamento.status}</p>

                    </div>

                `;

                });

            }

            catch (erro) {

                console.log(erro);
                alert("Erro ao carregar os agendamentos.");

            }

        }

        // Limpa os dados da sessão e retorna para a tela de login
        function sair() {
            sessionStorage.clear();
            window.location.href = "login.html";
        }

        carregarDashboard();

    </script>

    <footer class="rodape">
        <p>Lavador do Deir, a escolha certa para manter seu veículo sempre limpo e brilhando!</p>
    </footer>
</body>

</html>
