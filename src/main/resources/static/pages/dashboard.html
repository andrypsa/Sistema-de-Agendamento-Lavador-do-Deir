<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Lavador do Deir</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="container">

        <h1>Lavador do Deir</h1>

        <h2>Área do Cliente</h2>

        <p class="info-cliente">
            Olá, Cliente!
        </p>

        <!-- Exibição do contador acumulado de lavagens para o plano de fidelidade -->
        <p class="info-cliente">
            Total de lavadas: <strong>0</strong>
        </p>

        <!-- Botão de ação rápida que direciona para o formulário de agendamentos -->
        <button onclick="window.location.href='agendamento.html'">
            Agende a lavada do seu veículo
        </button>

        <br><br>

        <!-- Botão de navegação para a tela que mostra os serviços já realizados -->
        <button onclick="window.location.href='historico.html'">
            Histórico
        </button>

        <br><br>

        <!-- Botão para abrir o painel de cupons de desconto ativos do usuário -->
        <button onclick="window.location.href='cupons.html'">
            Meus Cupons
        </button>

        <br><br>

        <!-- Botão de encerramento de sessão que retorna para o login -->
        <button onclick="window.location.href='login.html'">
            Sair
        </button>

    </div>

</body>

</html>
