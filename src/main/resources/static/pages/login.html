<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lavador do Deir</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="page-content">

        <div class="page-title-card">
            <h1>Lavador do Deir</h1>
        </div>

        <div class="container">

            <h2>Login</h2>

            <!-- Formulário estruturado para capturar as credenciais de acesso do usuário -->
            <form id="formLogin">

                <input type="email" id="email" placeholder="E-mail" required>
                <input type="password" id="senha" placeholder="Senha" required>
                <button type="submit">
                    Entrar
                </button>

            </form>

            <!-- Link de navegação para redirecionar novos usuários à tela de registro -->
            <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px;">
                <a href="cadastro.html">Criar conta</a>
                <button id="btnAcessoAdm"
                    style="padding:4px 8px;font-size:0.85rem;max-width:120px;cursor:pointer;align-self:flex-end;">Acesso
                    ADM</button>
            </div>

        </div>

    </div>
    <footer class="rodape">
        <p>Lavador do Deir, a escolha certa para manter seu veículo sempre limpo e brilhando!</p>
    </footer>

    <script src="../js/app.js"></script>

</body>

</html>
