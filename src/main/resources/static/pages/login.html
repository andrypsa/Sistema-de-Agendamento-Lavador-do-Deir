<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lavador do Deir</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="container">

        <h1>Lavador do Deir</h1>

        <h2>Login</h2>

        <!-- Formulário estruturado para capturar as credenciais de acesso do usuário -->
        <form id="formLogin">

            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="submit">
                Entrar
            </button>

        </form>

        <!-- Link de navegação para redirecionar novos usuários à tela de registro -->
        <a href="cadastro.html">
            Criar conta
        </a>

    </div>

    <footer class="rodape">

        <p>Praticidade para você, cuidado para o seu veículo.</p>
        <p>Cadastre-se e experimente a comodidade de um serviço de lavagem de carros eficiente e confiável.</p>
        <p>Lavador do Deir, a escolha certa para manter seu veículo sempre limpo e brilhando!</p>
    </footer>

    <script src="../js/app.js"></script>

</body>

</html>
