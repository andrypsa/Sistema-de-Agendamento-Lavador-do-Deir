```html
<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - Lavador do Deir</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="page-content">

        <div class="page-title-card">
            <h1>Lavador do Deir</h1>
        </div>

        <div class="container">
            <h2>Agendar Lavada</h2>

            <!-- Formulário para capturar os dados do veículo e da lavagem -->
            <form id="formAgendamento">

                <!-- Seleção do tipo de veículo -->
                <select id="tipoVeiculo" required>
                    <option value="">Selecione o veículo</option>
                    <option>Bicicleta</option>
                    <option>Moto</option>
                    <option>Carro</option>
                    <option>Caminhonete</option>
                    <option>Caminhão</option>
                    <option>Máquina Agrícola</option>
                    <option>Outros - descreva em observações</option>
                </select>

                <input type="text" id="marca" placeholder="Marca">
                <input type="text" id="modelo" placeholder="Modelo">

                <!-- Seleção do nível de sujeira do veículo -->
                <select id="nivelSujeira" required>
                    <option value="">Nível de sujeira</option>
                    <option>Baixo</option>
                    <option>Médio</option>
                    <option>Alto</option>
                </select>

                <!-- Escolha da data do agendamento -->
                <div class="campo-data">
                    <label for="data">Data de agendamento</label>
                    <input type="date" id="data" required>
                </div>

                <!-- Seleção do horário disponível para atendimento -->
                <label for="hora">Horário de agendamento</label>
                <select id="hora" required>
                    <option value="">Selecione o horário</option>
                    <option value="07:00">07:00</option>
                    <option value="07:30">07:30</option>
                    <option value="08:00">08:00</option>
                    <option value="08:30">08:30</option>
                    <option value="09:00">09:00</option>
                    <option value="09:30">09:30</option>
                    <option value="10:00">10:00</option>
                    <option value="10:30">10:30</option>
                    <option value="11:00">11:00</option>
                    <option value="13:00">13:00</option>
                    <option value="13:30">13:30</option>
                    <option value="14:00">14:00</option>
                    <option value="14:30">14:30</option>
                    <option value="15:00">15:00</option>
                    <option value="15:30">15:30</option>
                    <option value="16:00">16:00</option>
                    <option value="16:30">16:30</option>
                </select>

                <!-- Campo opcional para observações adicionais -->
                <label for="observacao">Observações adicionais</label>
                <textarea id="observacao" rows="4" placeholder=""></textarea>

                <p class="aviso-valores">
                    Os valores serão informados após avaliação do veículo. Para avaliação antes do agendamento, entre em
                    contato pelo WhatsApp.
                </p>

                <!-- Abre o WhatsApp para solicitar avaliação antes do agendamento -->
                <button type="button" onclick="abrirWhatsApp()">
                    Solicitar avaliação pelo WhatsApp
                </button>

                <!-- Envia a solicitação de agendamento -->
                <button type="submit">
                    Solicitar Agendamento
                </button>
            </form>
            <br>

            <!-- Link para retornar à área do cliente -->
            <a href="dashboard.html">
                Voltar ao Dashboard
            </a>

        </div>

    </div>

    <script>
        const form = document.getElementById('formAgendamento');
        const campoData = document.getElementById('data');

        // Define a data mínima como a data atual, evitando agendamentos em datas passadas
        const hoje = new Date();
        const ano = hoje.getFullYear();
        const mes = String(hoje.getMonth() + 1).padStart(2, '0');
        const dia = String(hoje.getDate()).padStart(2, '0');
        const dataMinima = `${ano}-${mes}-${dia}`;
        campoData.min = dataMinima;

        // Bloqueia agendamentos aos domingos
        campoData.addEventListener('input', function () {
            const dataSelecionada = new Date(this.value + 'T00:00:00');
            if (dataSelecionada.getDay() === 0) {
                alert('O Lavador do Deir não funciona aos domingos! Por favor, escolha outra data.');
                this.value = '';
            }
        });

        // Envia os dados do agendamento para o backend
        form.addEventListener('submit', async function (event) {

            event.preventDefault();

            const usuarioLogado = JSON.parse(sessionStorage.getItem("user"));

            // Garante que somente clientes logados possam solicitar agendamentos
            if (!usuarioLogado || !usuarioLogado.id) {
                alert("Você precisa estar logado para solicitar um agendamento.");
                window.location.href = "login.html";
                return;
            }

            const agendamento = {

                clienteId: usuarioLogado.id,

                tipoVeiculo: document.getElementById("tipoVeiculo").value,

                marca: document.getElementById("marca").value,

                modelo: document.getElementById("modelo").value,

                nivelSujeira: document.getElementById("nivelSujeira").value,

                data: document.getElementById("data").value,

                horaInicio: document.getElementById("hora").value,

                status: "PENDENTE",

                observacao: document.getElementById("observacao").value,

                justificativa: ""

            };

            try {

                const resposta = await fetch("http://localhost:8080/agendamentos", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(agendamento)

                });

                const mensagem = await resposta.text();

                alert(mensagem);

                if (mensagem.includes("sucesso")) {
                    form.reset();
                    window.location.href = "dashboard.html";
                }

            } catch (erro) {

                alert("Erro ao enviar o agendamento.");

                console.log(erro);

            }

        });

        // Abre uma conversa no WhatsApp para avaliação prévia do valor
        function abrirWhatsApp() {
            const telefone = "5564999999999";

            const mensagem = encodeURIComponent(
                "Olá! Gostaria de agendar uma avaliação para saber o valor da lavagem."
            );

            window.open(`https://wa.me/${telefone}?text=${mensagem}`, "_blank");
        }
    </script>

</body>

</html>
```
