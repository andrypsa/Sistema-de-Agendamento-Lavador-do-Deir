<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Lavador do Deir</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="page-content">

        <div class="page-title-card">
            <h1>Lavador do Deir</h1>
        </div>

        <!-- Caixa principal que centraliza o formulário de cadastro na tela -->
        <div class="container">

            <h2>Criar Conta</h2>

            <!-- Formulário para capturar os dados do novo cliente -->
            <form id="formCadastro">

                <input
                    type="text"
                    id="nome"
                    placeholder="Nome completo"
                    required>

                <input
                    type="text"
                    id="telefone"
                    placeholder="Telefone"
                    required>

                <input
                    type="email"
                    id="email"
                    placeholder="E-mail"
                    required>

                <!-- Campo com caracteres ocultos para digitação da senha -->
                <input
                    type="password"
                    id="senha"
                    placeholder="Senha"
                    required>

                <!-- Botão para enviar os dados do cadastro -->
                <button type="submit">
                    Criar Conta
                </button>

            </form>

            <!-- Link de navegação para retornar à página de login -->
            <a href="login.html">
                Já possui conta? Entrar
            </a>

        </div>

    </div>

    <footer class="rodape">
        <p>Lavagem automotiva.</p>
        <p>Lavamos tapetes, carpetes e estofados.</p>
        <p>Para outros serviços e orçamentos, entre em contato conosco.</p>
    </footer>

    <!-- Importação do arquivo JavaScript responsável pela lógica de cadastro -->
    <script src="../js/app.js"></script>

</body>

</html>
