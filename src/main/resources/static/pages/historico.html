```html
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico - Lavador do Deir</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="page-content">

        <div class="page-title-card">
            <h1>Lavador do Deir</h1>
        </div>

        <div class="container">

            <h2>Histórico de Lavadas</h2>

            <div id="listaHistorico">
                <p>Carregando histórico...</p>
            </div>

            <br>

            <a href="dashboard.html">
                Voltar ao Dashboard
            </a>

        </div>

    </div>

    <footer class="rodape">
        <p>Lavador do Deir, a escolha certa para manter seu veículo sempre limpo e brilhando!</p>
    </footer>

    <script>

        async function carregarHistorico() {

            const usuarioLogado = JSON.parse(sessionStorage.getItem("user"));

            // Impede o acesso ao histórico caso não exista usuário logado
            if (!usuarioLogado || !usuarioLogado.id) {
                alert("Você precisa estar logado para acessar o histórico.");
                window.location.href = "login.html";
                return;
            }

            try {

                // Busca todos os agendamentos cadastrados no sistema
                const resposta = await fetch("http://localhost:8080/agendamentos");
                const agendamentos = await resposta.json();

                // Filtra apenas os agendamentos do cliente logado que já tiveram alguma decisão
                const historicoDoCliente = agendamentos
                    .filter(agendamento =>
                        agendamento.clienteId === usuarioLogado.id &&
                        agendamento.status !== "PENDENTE"
                    )
                    .sort((a, b) => {
                        const dataA = new Date(`${a.data}T${a.horaInicio}`);
                        const dataB = new Date(`${b.data}T${b.horaInicio}`);
                        return dataB - dataA;
                    });

                const lista = document.getElementById("listaHistorico");

                if (historicoDoCliente.length === 0) {
                    lista.innerHTML = "<p>Você ainda não possui histórico de lavadas.</p>";
                    return;
                }

                lista.innerHTML = "";

                // Exibe os registros do histórico, do mais recente para o mais antigo
                historicoDoCliente.forEach(agendamento => {

                    lista.innerHTML += `
                        <div class="historico-item">

                            <p><strong>Veículo:</strong> ${agendamento.tipoVeiculo}</p>
                            <p><strong>Marca:</strong> ${agendamento.marca || "Não informado"}</p>
                            <p><strong>Modelo:</strong> ${agendamento.modelo || "Não informado"}</p>
                            <p><strong>Nível de sujeira:</strong> ${agendamento.nivelSujeira}</p>
                            <p><strong>Data:</strong> ${agendamento.data}</p>
                            <p><strong>Horário:</strong> ${agendamento.horaInicio}</p>
                            <p><strong>Status:</strong> ${agendamento.status}</p>

                            ${agendamento.justificativa ? `<p><strong>Justificativa:</strong> ${agendamento.justificativa}</p>` : ""}

                        </div>
                    `;

                });

            } catch (erro) {

                console.log(erro);
                alert("Erro ao carregar o histórico.");

            }
        }

        carregarHistorico();

    </script>

</body>

</html>
```
